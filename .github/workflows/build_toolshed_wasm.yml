name: Build toolshed WASM

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'toolshed version (e.g. 2.5.1)'
        required: false
        default: '2.5.1'
  push:
    paths:
      - 'wasm/toolshed/**'
      - '.github/workflows/build_toolshed_wasm.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Verify emcc
        run: emcc --version

      - name: Build toolshed WASM
        run: |
          cd wasm/toolshed
          bash build.sh

      - name: Verify output
        run: |
          test -s wasm/toolshed/toolshed.wasm && echo "toolshed.wasm OK"
          test -s wasm/toolshed/toolshed.js   && echo "toolshed.js OK"

      - name: Run smoke test
        run: |
          node wasm/toolshed/smoke_test.js

      - name: Commit WASM output
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add wasm/toolshed/toolshed.js wasm/toolshed/toolshed.wasm
          git diff --staged --quiet || git commit -m "build: toolshed ${{ github.event.inputs.version || '2.5.1' }} WASM [ci skip]"
          git push
