name: Build lwasm WASM

# Trigger manually from GitHub Actions tab
# or automatically when lwasm source files change
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'lwtools version (e.g. 4.24 or 4.25)'
        required: false
        default: '4.24'
  push:
    paths:
      - 'wasm/lwasm/**'
      - '.github/workflows/build_lwasm_wasm.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Verify emcc
        run: emcc --version

      - name: Build lwasm WASM
        run: |
          cd wasm/lwasm
          bash build.sh
          # Write version file
          LWTOOLS=$(find ../.. -maxdepth 1 -type d -name "lwtools-*" | sort -V | tail -1 | xargs basename)
          echo "source: $LWTOOLS" > VERSION
          echo "built: $(date -u '+%d%b%Y').upper()" >> VERSION

      - name: Verify output
        run: |
          ls -la wasm/lwasm/lwasm.js wasm/lwasm/lwasm.wasm
          # Basic sanity check -- file should be non-empty
          test -s wasm/lwasm/lwasm.wasm && echo "lwasm.wasm OK"
          test -s wasm/lwasm/lwasm.js   && echo "lwasm.js OK"

      - name: Run smoke test
        run: |
          node wasm/lwasm/smoke_test.js 2>&1 | tee /tmp/smoke_output.txt

      - name: Write build report
        if: always()
        run: |
          echo "# lwasm WASM Build Report" > wasm/lwasm/BUILD_REPORT.md
          echo "" >> wasm/lwasm/BUILD_REPORT.md
          echo "**Built:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> wasm/lwasm/BUILD_REPORT.md
          echo "**lwtools:** $(ls -d lwtools-* | sort -V | tail -1)" >> wasm/lwasm/BUILD_REPORT.md
          echo "**WASM size:** $(wc -c < wasm/lwasm/lwasm.wasm 2>/dev/null || echo 'build failed') bytes" >> wasm/lwasm/BUILD_REPORT.md
          echo "" >> wasm/lwasm/BUILD_REPORT.md
          echo "## Smoke Test Output" >> wasm/lwasm/BUILD_REPORT.md
          echo '```' >> wasm/lwasm/BUILD_REPORT.md
          cat /tmp/smoke_output.txt >> wasm/lwasm/BUILD_REPORT.md 2>/dev/null || echo "smoke test did not run" >> wasm/lwasm/BUILD_REPORT.md
          echo '```' >> wasm/lwasm/BUILD_REPORT.md

      - name: Commit WASM output
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add wasm/lwasm/lwasm.js wasm/lwasm/lwasm.wasm wasm/lwasm/BUILD_REPORT.md
          git diff --staged --quiet || git commit -m "build: lwasm ${{ github.event.inputs.version || '4.24' }} WASM [ci skip]"
          git pull --rebase origin main
          git push
