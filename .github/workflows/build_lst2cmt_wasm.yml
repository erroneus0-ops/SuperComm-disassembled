name: Build lst2cmt WASM

on:
  workflow_dispatch:
  push:
    paths:
      - 'wasm/lst2cmt/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
      - name: Build
        run: |
          cd wasm/lst2cmt
          bash build.sh
      - name: Write build report
        if: always()
        run: |
          echo "# lst2cmt WASM Build Report" > wasm/lst2cmt/BUILD_REPORT.md
          echo "**Built:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> wasm/lst2cmt/BUILD_REPORT.md
          echo "**Size:** $(wc -c < wasm/lst2cmt/lst2cmt.wasm 2>/dev/null || echo 'build failed') bytes" >> wasm/lst2cmt/BUILD_REPORT.md
      - name: Commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add wasm/lst2cmt/
          git diff --staged --quiet || git commit -m "build: lst2cmt WASM [ci skip]"
          git pull --rebase origin main
          git push
