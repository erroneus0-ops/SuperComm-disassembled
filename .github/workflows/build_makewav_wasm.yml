name: Build makewav WASM

on:
  workflow_dispatch:
  push:
    paths:
      - 'wasm/makewav/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
      - name: Build
        run: |
          cd wasm/makewav
          bash build.sh
      - name: Write build report
        if: always()
        run: |
          echo "# makewav WASM Build Report" > wasm/makewav/BUILD_REPORT.md
          echo "**Built:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> wasm/makewav/BUILD_REPORT.md
          echo "**Size:** $(wc -c < wasm/makewav/makewav.wasm 2>/dev/null || echo 'build failed') bytes" >> wasm/makewav/BUILD_REPORT.md
      - name: Commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add wasm/makewav/
          git diff --staged --quiet || git commit -m "build: makewav WASM [ci skip]"
          git pull --rebase origin main
          git push
