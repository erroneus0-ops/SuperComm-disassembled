name: Build ar2 WASM

on:
  workflow_dispatch:
  push:
    paths:
      - 'wasm/ar2/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
      - name: Build
        run: |
          cd wasm/ar2
          bash build.sh
      - name: Write build report
        if: always()
        run: |
          echo "# ar2 WASM Build Report" > wasm/ar2/BUILD_REPORT.md
          echo "**Built:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> wasm/ar2/BUILD_REPORT.md
          echo "**Size:** $(wc -c < wasm/ar2/ar2.wasm 2>/dev/null || echo 'build failed') bytes" >> wasm/ar2/BUILD_REPORT.md
      - name: Commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add wasm/ar2/
          git diff --staged --quiet || git commit -m "build: ar2 WASM [ci skip]"
          git push
