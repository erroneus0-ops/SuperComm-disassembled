<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 56" width="32" height="28">

  <!-- Top bun: dome reduced by ~1/3, sides more prominent -->
  <!-- sides height ~8, arc adds ~16 = ratio closer to 1:2 -->
  <path d="M 6,26
           Q 6,10 32,10
           Q 58,10 58,26
           Z"
        fill="#c8922a"/>

  <!-- gap -->

  <!-- Lettuce: ruffled green -->
  <rect x="4" y="29" width="56" height="4" rx="1" fill="#4a9e3f"/>
  <path d="M4,29 Q10,26.5 16,29 Q22,26.5 28,29 Q34,26.5 40,29 Q46,26.5 52,29 Q58,26.5 60,29"
        fill="none" stroke="#3a8e2f" stroke-width="1.5"/>

  <!-- gap -->

  <!-- Cheese: yellow with corner overhangs -->
  <rect x="5" y="35" width="54" height="3" rx="1" fill="#f0c030"/>
  <polygon points="5,35 5,38 2,39 2,36" fill="#f0c030"/>
  <polygon points="59,35 59,38 62,39 62,36" fill="#f0c030"/>

  <!-- gap -->

  <!-- Patty: thick dark brown -->
  <rect x="6" y="40" width="52" height="7" rx="2" fill="#5c3010"/>

  <!-- gap -->

  <!-- Bottom bun: flat -->
  <rect x="6" y="50" width="52" height="5" rx="2" fill="#c8922a"/>

</svg>
