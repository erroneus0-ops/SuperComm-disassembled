<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 52" width="32" height="26">

  <!-- Top bun: rectangle base with arc dome -->
  <!-- sides height ~6, arc peak adds ~24 more = ratio ~1:4 -->
  <path d="M 6,30 
           Q 6,6 32,6 
           Q 58,6 58,30 
           Z" 
        fill="#c8922a"/>

  <!-- Lettuce: ruffled green, slightly wider -->
  <rect x="4" y="30" width="56" height="5" rx="1" fill="#4a9e3f"/>
  <!-- ruffle suggestion -->
  <path d="M4,30 Q10,27 16,30 Q22,27 28,30 Q34,27 40,30 Q46,27 52,30 Q58,27 60,30" 
        fill="none" stroke="#3a8e2f" stroke-width="1.5"/>

  <!-- Cheese: yellow, wider than patty, thin -->
  <rect x="5" y="35" width="54" height="4" rx="1" fill="#f0c030"/>
  <!-- slight overhang corners -->
  <polygon points="5,35 5,39 2,40 2,36" fill="#f0c030"/>
  <polygon points="59,35 59,39 62,40 62,36" fill="#f0c030"/>

  <!-- Patty: dark brown, thick -->
  <rect x="6" y="39" width="52" height="8" rx="2" fill="#5c3010"/>

  <!-- Bottom bun: flat rectangle, same tan as top -->
  <rect x="6" y="47" width="52" height="5" rx="2" fill="#c8922a"/>

</svg>
