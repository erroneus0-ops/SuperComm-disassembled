<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="32" height="32">

  <!-- Top bun: taller dome, sides about 1/4 of arc height -->
  <!-- viewBox 0-64, bun occupies y=4 to y=28 -->
  <!-- sides at y=24 (height=4), arc peak at y=4 (height=20 above sides, ratio 1:5) -->
  <path d="M 6,28
           Q 6,4 32,4
           Q 58,4 58,28
           Z"
        fill="#c8922a"/>

  <!-- gap: y=28 to y=33 -->

  <!-- Lettuce: y=33 to y=38 -->
  <rect x="4" y="33" width="56" height="5" rx="1" fill="#4a9e3f"/>
  <path d="M4,33 Q10,30 16,33 Q22,30 28,33 Q34,30 40,33 Q46,30 52,33 Q58,30 60,33"
        fill="none" stroke="#3a8e2f" stroke-width="1.5"/>

  <!-- gap: y=38 to y=42 -->

  <!-- Cheese: y=42 to y=45 with overhangs -->
  <rect x="5" y="42" width="54" height="3" rx="1" fill="#f0c030"/>
  <polygon points="5,42 5,45 2,46 2,43" fill="#f0c030"/>
  <polygon points="59,42 59,45 62,46 62,43" fill="#f0c030"/>

  <!-- gap: y=45 to y=49 -->

  <!-- Patty: y=49 to y=56 -->
  <rect x="6" y="49" width="52" height="7" rx="2" fill="#5c3010"/>

  <!-- gap: y=56 to y=59 -->

  <!-- Bottom bun: y=59 to y=64 -->
  <rect x="6" y="59" width="52" height="5" rx="2" fill="#c8922a"/>

</svg>
