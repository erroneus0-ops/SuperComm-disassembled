<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Tandy CM-8 color monitor - bezel reference illustration v1</title>
<desc>Draft front-face illustration of the Tandy CM-8 monitor for Inkscape refinement. Red dashed box marks screen area. Screen opening uses fill-rule evenodd.</desc>

<!-- Drop shadow -->
<rect x="36" y="32" width="618" height="528" rx="16" fill="#111" opacity="0.4"/>

<!-- Main outer case -->
<rect x="28" y="24" width="618" height="528" rx="14" fill="#3e3228"/>

<!-- Top/left highlight edge -->
<rect x="28" y="24" width="618" height="6" rx="14" fill="#5a4c40"/>
<rect x="28" y="24" width="6" height="528" rx="14" fill="#5a4c40"/>

<!-- Bottom/right shadow edge -->
<rect x="28" y="546" width="618" height="6" rx="0" fill="#1a1410"/>
<rect x="634" y="24" width="12" height="528" rx="0" fill="#1a1410"/>

<!-- Face plate -->
<rect x="40" y="36" width="594" height="510" rx="10" fill="#423629"/>

<!-- Screen surround recess -->
<rect x="92" y="52" width="500" height="400" rx="10" fill="#1e1710"/>

<!-- Screen frame with evenodd hole -->
<path d="
  M92,52 Q82,52 82,62 L82,452 Q82,462 92,462 L592,462 Q602,462 602,452 L602,62 Q602,52 592,52 Z
  M108,68 L576,68 L576,438 L108,438 Z
" fill="#1e1710" fill-rule="evenodd"/>

<!-- Screen glass -->
<rect x="108" y="68" width="468" height="370" fill="#060504"/>

<!-- Screen reflection glints -->
<line x1="118" y1="78" x2="160" y2="100" stroke="#2a2218" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
<line x1="118" y1="90" x2="148" y2="106" stroke="#2a2218" stroke-width="1" stroke-linecap="round" opacity="0.4"/>

<!-- Lower control panel strip -->
<rect x="80" y="462" width="524" height="62" rx="6" fill="#2e2418"/>
<rect x="80" y="462" width="524" height="2" fill="#1a1210"/>
<rect x="80" y="522" width="524" height="2" fill="#181008"/>

<!-- Power button -->
<rect x="106" y="477" width="38" height="28" rx="5" fill="#1a1410" stroke="#3a2e22" stroke-width="1"/>
<rect x="107" y="478" width="36" height="14" rx="4" fill="#242018"/>
<text x="125" y="504" text-anchor="middle" fill="#555" font-size="7" font-family="sans-serif" letter-spacing="1">POWER</text>

<!-- Power LED -->
<circle cx="155" cy="491" r="5" fill="#0a0a0a" stroke="#2a2018" stroke-width="1"/>
<circle cx="155" cy="491" r="3" fill="#00cc44"/>
<circle cx="154" cy="490" r="1" fill="#88ffaa" opacity="0.8"/>

<!-- Knob: Brightness -->
<circle cx="430" cy="491" r="16" fill="#1a1410" stroke="#3a2e22" stroke-width="1.5"/>
<circle cx="430" cy="491" r="11" fill="#252018"/>
<circle cx="430" cy="491" r="7" fill="#1a1610"/>
<line x1="430" y1="484" x2="430" y2="479" stroke="#aa9980" stroke-width="2" stroke-linecap="round"/>
<text x="430" y="515" text-anchor="middle" fill="#554438" font-size="8" font-family="sans-serif">BRIGHT</text>

<!-- Knob: Contrast -->
<circle cx="486" cy="491" r="16" fill="#1a1410" stroke="#3a2e22" stroke-width="1.5"/>
<circle cx="486" cy="491" r="11" fill="#252018"/>
<circle cx="486" cy="491" r="7" fill="#1a1610"/>
<line x1="491" y1="486" x2="495" y2="482" stroke="#aa9980" stroke-width="2" stroke-linecap="round"/>
<text x="486" y="515" text-anchor="middle" fill="#554438" font-size="8" font-family="sans-serif">CONTRAST</text>

<!-- Knob: Vert Hold -->
<circle cx="542" cy="491" r="16" fill="#1a1410" stroke="#3a2e22" stroke-width="1.5"/>
<circle cx="542" cy="491" r="11" fill="#252018"/>
<circle cx="542" cy="491" r="7" fill="#1a1610"/>
<line x1="542" y1="484" x2="542" y2="479" stroke="#aa9980" stroke-width="2" stroke-linecap="round"/>
<text x="542" y="515" text-anchor="middle" fill="#554438" font-size="8" font-family="sans-serif">VERT HOLD</text>

<!-- Branding -->
<text x="290" y="484" text-anchor="middle" fill="#6a5848" font-size="13" font-family="sans-serif" font-weight="bold" letter-spacing="3">COLOR MONITOR</text>
<text x="290" y="500" text-anchor="middle" fill="#8a7060" font-size="18" font-family="sans-serif" font-weight="bold" letter-spacing="4">CM-8</text>
<text x="290" y="514" text-anchor="middle" fill="#4a3c30" font-size="8" font-family="sans-serif" letter-spacing="2">TANDY</text>

<!-- Vent slots left -->
<rect x="42" y="160" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="42" y="168" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="42" y="176" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="42" y="184" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="42" y="192" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="42" y="200" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="42" y="208" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="42" y="216" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="42" y="224" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="42" y="232" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="42" y="240" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="42" y="248" width="28" height="3" rx="1" fill="#1a1410"/>

<!-- Vent slots right -->
<rect x="614" y="160" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="614" y="168" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="614" y="176" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="614" y="184" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="614" y="192" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="614" y="200" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="614" y="208" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="614" y="216" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="614" y="224" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="614" y="232" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="614" y="240" width="28" height="3" rx="1" fill="#1a1410"/>
<rect x="614" y="248" width="28" height="3" rx="1" fill="#1a1410"/>

<!-- Screen area annotation - DELETE IN INKSCAPE -->
<rect x="108" y="68" width="468" height="370" fill="none" stroke="#ff0000" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
<text x="342" y="255" text-anchor="middle" fill="#ff0000" font-size="14" font-family="sans-serif" opacity="0.5">screen area  468 x 370</text>
<text x="342" y="273" text-anchor="middle" fill="#ff0000" font-size="10" font-family="sans-serif" opacity="0.5">delete this annotation group in Inkscape</text>

</svg>
